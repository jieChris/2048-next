  <style>
      /* Test Board Specific Styles */
      .dashboard-container {
          display: flex;
          justify-content: space-between;
          margin-bottom: 20px;
          margin-top: 10px;
      }
      .dashboard-box {
          background: #bbada0; /* Box bg */
          padding: 10px;
          border-radius: 6px;
          color: white;
          box-sizing: border-box;
          min-height: 120px; /* Ensure height alignment */
      }
      .dashboard-stats {
          width: 25%;
      }
      .dashboard-controls {
          width: 68%;
          text-align: center;
          display: flex;
          width: 71%;
          text-align: center;
          /* Center content */
          display: flex;
          justify-content: center;
          align-items: center;
      }
      .dashboard-controls label {
          font-weight: bold;
          display: block;
          margin-bottom: 5px;
      }
      .dashboard-controls select {
          padding: 5px;
          border-radius: 3px;
          border: none;
          background: #faf8ef;
          color: #776e65;
          font-weight: bold;
      }
      .selection-grid {
          display: flex;
          flex-wrap: wrap;
          justify-content: center;
          gap: 4px;
          margin-top: 5px;
          width: 100%;
      }
      .selection-tile {
          /* Simulate game tile but static */
          position: relative !important;
          width: 55px !important;
          height: 55px !important;
          border-radius: 3px;
          cursor: pointer;
          transition: transform 0.1s;
      }
      .selection-tile .tile-inner {
          width: 100% !important;
          height: 100% !important;
          line-height: 53px !important;
          font-size: 20px !important;
          border-radius: 3px;
      }
      /* Adjust fonts for larger numbers */
      .selection-tile.tile-128 .tile-inner,
      .selection-tile.tile-256 .tile-inner,
      .selection-tile.tile-512 .tile-inner { font-size: 18px !important; }
      
      .selection-tile.tile-1024 .tile-inner,
      .selection-tile.tile-2048 .tile-inner,
      .selection-tile.tile-4096 .tile-inner,
      .selection-tile.tile-8192 .tile-inner { font-size: 14px !important; }
      
      .selection-tile.tile-16384 .tile-inner,
      .selection-tile.tile-32768 .tile-inner { font-size: 12px !important; }

      .selection-tile:hover {
          transform: scale(1.1);
          z-index: 5;
      }
      .selection-tile.selected {
          transform: scale(1.15);
          box-shadow: 0 0 5px 2px rgba(255, 255, 0, 0.8); /* Highlight glow */
          z-index: 10;
          border: 2px solid #8f7a66; /* Border */
      }
      
      /* Special style for 0 */
      /* Special style for 0 */
      .selection-tile.tile-0 .tile-inner {
          background: rgba(238, 228, 218, 0.35);
          color: #776e65;
          text-align: center;
          line-height: 55px !important;
          font-weight: bold;
      }

      .scores-container.practice-gesture-entry {
          cursor: pointer;
      }
      .scores-container.practice-gesture-entry.practice-gesture-active {
          box-shadow: 0 0 0 2px #8f7a66 inset;
          border-radius: 6px;
      }
      
      .grid-cell {
          cursor: pointer; /* Indicate clickable */
      }
      /* Hover effect for cleaner UI */
      .grid-cell:hover {
          background: rgba(238, 228, 218, 0.35);
      }
      .tile-container {
          pointer-events: none;
      }
      
      /* Guide Overlay */
      #guide-overlay {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: rgba(0, 0, 0, 0.8);
          z-index: 2000;
          display: none;
      }
      #guide-message {
          position: absolute;
          color: white;
          font-weight: bold;
          font-size: 24px;
          z-index: 2002;
          pointer-events: none;
      }
      #guide-arrow {
          font-size: 40px;
          display: block;
          line-height: 1;
          margin-bottom: 5px;
      }
      .guide-highlight {
          position: static;
          z-index: 2001;
          background: #faf8ef;
          box-shadow: 0 0 0 5px #faf8ef, 0 0 20px 10px rgba(255, 255, 255, 0.5);
          border-radius: 4px;
      }
      #practice-stats-actions {
          position: static;
          display: flex;
          justify-content: flex-start;
          gap: 8px;
          margin: -2px 0 8px;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-toggle {
          display: none !important;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay {
          display: block !important;
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: transparent;
          z-index: 900;
          pointer-events: none;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-content {
          --pku-stats-scale: 1;
          position: fixed;
          top: 92px;
          left: 12px;
          width: 210px;
          max-width: 210px;
          margin: 0;
          padding: calc(12px * var(--pku-stats-scale));
          border-radius: calc(8px * var(--pku-stats-scale));
          background: rgba(187, 173, 160, 0.96);
          color: #f9f6f2;
          box-shadow: 0 3px 10px rgba(0, 0, 0, 0.18);
          pointer-events: auto;
          user-select: none;
          min-width: 170px;
          min-height: 180px;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-content::before {
          content: "";
          position: absolute;
          top: -44px;
          left: -20px;
          right: -20px;
          height: 56px;
          background: transparent;
          pointer-events: auto;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-content h3 {
          margin-bottom: calc(8px * var(--pku-stats-scale));
          color: #f9f6f2;
          font-size: calc(16px * var(--pku-stats-scale));
          cursor: grab;
          touch-action: none;
      }
      .pku2048-page.pku2048-stats-inline-dragging #stats-panel-overlay .stats-panel-content h3 {
          cursor: grabbing;
      }
      .pku2048-page.pku2048-stats-inline-locked #stats-panel-overlay .stats-panel-content h3 {
          cursor: default;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-row {
          padding: calc(6px * var(--pku-stats-scale)) 0;
          border-bottom: 1px solid rgba(249, 246, 242, 0.2);
          font-size: calc(14px * var(--pku-stats-scale));
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-row span:last-child {
          font-weight: 700;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .replay-modal-actions {
          display: none;
      }
      .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-lock-btn {
          position: absolute;
          top: 0;
          left: 50%;
          width: calc(28px * var(--pku-stats-scale));
          height: calc(28px * var(--pku-stats-scale));
          padding: 0;
          border: calc(1px * var(--pku-stats-scale)) solid rgba(249, 246, 242, 0.45);
          border-radius: 999px;
          background: rgba(119, 110, 101, 0.92);
          color: #f9f6f2;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          opacity: 0;
          transform: translate(-50%, -108%);
          transition: opacity 0.16s ease, transform 0.16s ease, background 0.16s ease;
          pointer-events: none;
          box-shadow: 0 calc(2px * var(--pku-stats-scale)) calc(8px * var(--pku-stats-scale)) rgba(0, 0, 0, 0.25);
          z-index: 3;
      }
      .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-lock-btn svg {
          width: calc(14px * var(--pku-stats-scale));
          height: calc(14px * var(--pku-stats-scale));
          display: block;
      }
      .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-resize-handle {
          position: absolute;
          right: calc(3px * var(--pku-stats-scale));
          bottom: calc(3px * var(--pku-stats-scale));
          width: calc(16px * var(--pku-stats-scale));
          height: calc(16px * var(--pku-stats-scale));
          border: 0;
          border-radius: calc(4px * var(--pku-stats-scale));
          padding: 0;
          background:
            linear-gradient(135deg, transparent 46%, rgba(249, 246, 242, 0.72) 47%, rgba(249, 246, 242, 0.72) 54%, transparent 55%),
            linear-gradient(135deg, transparent 62%, rgba(249, 246, 242, 0.5) 63%, rgba(249, 246, 242, 0.5) 70%, transparent 71%);
          cursor: nwse-resize;
          opacity: 0;
          pointer-events: none;
          transition: opacity 0.16s ease;
          z-index: 3;
      }
      .pku2048-page.pku2048-stats-inline-resizing,
      .pku2048-page.pku2048-stats-inline-resizing * {
          cursor: nwse-resize !important;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-content:hover #pku2048-stats-lock-btn,
      .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-lock-btn:hover {
          opacity: 1;
          transform: translate(-50%, -100%);
          pointer-events: auto;
      }
      .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-content:hover #pku2048-stats-resize-handle,
      .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-resize-handle:hover {
          opacity: 1;
          pointer-events: auto;
      }
      @media (hover: none), (pointer: coarse) {
          .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-lock-btn {
              opacity: 1;
              transform: translate(-50%, -100%);
              pointer-events: auto;
          }
          .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-resize-handle {
              opacity: 1;
              pointer-events: auto;
          }
      }
      .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-lock-btn.is-locked {
          background: rgba(143, 122, 102, 0.96);
      }
      .pku2048-page.pku2048-stats-inline-mode #pku2048-stats-lock-btn:hover {
          background: rgba(119, 110, 101, 0.95);
      }
      @media (max-width: 900px) {
          .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-content {
              top: 84px;
              left: 8px;
              width: 186px;
              max-width: 186px;
              padding: calc(10px * var(--pku-stats-scale));
          }
          .pku2048-page.pku2048-stats-inline-mode #stats-panel-overlay .stats-panel-row {
              font-size: calc(13px * var(--pku-stats-scale));
          }
      }
  </style>
