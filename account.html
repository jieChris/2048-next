<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>2048 Account Center</title>
<link href="style/main.css?v=20260313-02" rel="stylesheet" type="text/css">
  <link href="style/palette_page.css?v=20260310-01" rel="stylesheet" type="text/css">
  <link href="style/account_page.css?v=20260312-01" rel="stylesheet" type="text/css">
  <link rel="icon" type="image/svg+xml" sizes="any" href="meta/favicon.svg?v=20260305-1">
  <link rel="shortcut icon" href="meta/favicon.svg?v=20260305-1">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
</head>
<body data-page="account-hub">
  <main class="palette-page-shell account-page-shell">
    <header class="palette-page-header">
      <div class="palette-title-wrap">
        <p class="palette-kicker" id="account-kicker">2048 Online Hub</p>
        <h1 class="palette-title" id="account-title">Account Center</h1>
        <p class="palette-subtitle" id="account-subtitle">Sign up, log in, and check online leaderboards.</p>
      </div>
      <nav class="palette-nav">
        <a class="replay-button palette-nav-btn" href="index.html" id="account-nav-home">Home</a>
        <a class="replay-button palette-nav-btn" href="palette.html" id="account-nav-palette">Palette</a>
        <a class="replay-button palette-nav-btn" href="Practice_board.html" id="account-nav-practice">Practice</a>
      </nav>
    </header>

    <section class="account-grid">
      <section class="card-surface account-auth-card">
        <div class="panel-head">
          <h2 id="account-auth-heading">Account</h2>
          <span id="account-auth-state-tag" class="panel-pill">--</span>
        </div>

        <div id="account-auth-grid" class="account-auth-grid">
          <label for="account-email" id="account-email-label">Email</label>
          <input id="account-email" class="account-input" type="email" placeholder="Enter email">

          <label for="account-password" id="account-password-label">Password</label>
          <input id="account-password" class="account-input" type="password" placeholder="Enter password">
        </div>

        <div id="account-action-row" class="account-action-row">
          <button id="account-login-btn" class="replay-button" type="button">Login</button>
          <button id="account-register-btn" class="replay-button" type="button">Register</button>
          <button id="account-logout-btn" class="replay-button" type="button">Logout</button>
        </div>

        <p id="account-auth-tip" class="account-tip" aria-live="polite"></p>

        <section class="account-user-card">
          <h3 id="account-user-title">Current Account</h3>
          <div class="account-user-lines">
            <div><span id="account-user-id-label">User ID:</span><strong id="account-user-id">--</strong></div>
            <div><span id="account-user-nickname-label">Nickname:</span><strong id="account-user-nickname">--</strong></div>
            <div><span id="account-user-email-label">Email:</span><strong id="account-user-email">--</strong></div>
            <div><span id="account-user-created-label">Created At:</span><strong id="account-user-created">--</strong></div>
          </div>
        </section>
      </section>

      <section class="card-surface account-board-card">
        <div class="panel-head">
          <h2 id="account-board-heading">Leaderboard</h2>
          <div class="account-board-tools">
            <label for="account-board-mode" id="account-board-mode-label">Mode</label>
            <select id="account-board-mode" class="settings-select"></select>
            <label for="account-board-limit" id="account-board-limit-label">Limit</label>
            <select id="account-board-limit" class="settings-select">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
            <button id="account-board-refresh" class="replay-button" type="button">Refresh</button>
          </div>
        </div>

        <div class="account-board-head-row">
          <span id="account-col-rank">Rank</span>
          <span id="account-col-name">Name</span>
          <span id="account-col-score">Score</span>
          <span id="account-col-date">Updated</span>
        </div>
        <div id="account-board-list" class="account-board-list"></div>
        <p id="account-board-tip" class="account-tip" aria-live="polite"></p>
      </section>
    </section>
  </main>

  <script src="js/account_page.js?v=20260312-03"></script>
</body>
</html>
