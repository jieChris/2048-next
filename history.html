<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>2048 本地历史记录</title>
  <link href="style/main.css?v=1772005002000" rel="stylesheet" type="text/css">
  <link rel="shortcut icon" href="favicon.ico?v=42">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
</head>
<body data-page="history">
  <div class="container portal-container">
    <div class="portal-header">
      <h1 class="title"><a href="index.html" style="text-decoration:none;color:inherit;">2048</a> 本地历史</h1>
      <div class="portal-nav">
        <a href="index.html">首页</a>
        <a href="modes.html">模式</a>
        <a href="replay.html">回放</a>
      </div>
    </div>

    <div class="portal-card">
      <div class="portal-actions-inline">
        <label>模式</label>
        <select id="history-mode" class="settings-select portal-inline-select">
          <option value="">全部模式</option>
        </select>

        <label>关键词</label>
        <input id="history-keyword" class="portal-inline-input" placeholder="模式/分数/ID">

        <label>排序</label>
        <select id="history-sort" class="settings-select portal-inline-select">
          <option value="ended_desc">按时间（新到旧）</option>
          <option value="ended_asc">按时间（旧到新）</option>
          <option value="score_desc">按分数（高到低）</option>
        </select>

        <label>Adapter诊断</label>
        <select id="history-adapter-filter" class="settings-select portal-inline-select">
          <option value="all">全部</option>
          <option value="mismatch">仅不一致</option>
          <option value="match">仅一致</option>
          <option value="incomplete">样本不足</option>
        </select>

        <label>Burn-in窗口</label>
        <select id="history-burnin-window" class="settings-select portal-inline-select">
          <option value="50">最近50条</option>
          <option value="100">最近100条</option>
          <option value="200" selected>最近200条</option>
          <option value="500">最近500条</option>
          <option value="all">全部</option>
        </select>

        <label>连续窗口</label>
        <select id="history-sustained-window" class="settings-select portal-inline-select">
          <option value="1">1个窗口</option>
          <option value="2">2个窗口</option>
          <option value="3" selected>3个窗口</option>
          <option value="4">4个窗口</option>
        </select>

        <button class="replay-button" id="history-load-btn">刷新</button>
      </div>

      <div class="portal-actions-inline" style="margin-top:8px;">
        <button class="replay-button" id="history-export-all-btn">导出全部</button>
        <button class="replay-button" id="history-export-mismatch-btn">导出不一致</button>
        <button class="replay-button" id="history-import-btn">导入合并</button>
        <button class="replay-button" id="history-import-replace-btn">导入并替换</button>
        <button class="replay-button" id="history-clear-all-btn">清空全部</button>
        <input id="history-import-file" type="file" accept="application/json,.json" style="display:none;">
      </div>

      <div id="history-status" class="portal-status"></div>
      <div id="history-summary" class="portal-muted"></div>
      <div id="history-burnin-summary" class="history-burnin-card"></div>
      <div id="history-canary-policy" class="history-canary-card"></div>
    </div>

    <div class="portal-actions-inline" style="justify-content:flex-end; margin-bottom:10px;">
      <button class="replay-button" id="history-prev-page">上一页</button>
      <button class="replay-button" id="history-next-page">下一页</button>
    </div>

    <div id="history-list"></div>
  </div>

  <script src="js/theme_manager.js?v=1771600400000"></script>
  <script src="js/mode_catalog.js?v=1771905000000"></script>
  <script src="js/legacy_adapter_runtime.js?v=1772004000000"></script>
  <script src="js/core_history_board_runtime.js?v=1772191000000"></script>
  <script src="js/core_history_canary_storage_runtime.js?v=1772183000000"></script>
  <script src="js/core_history_canary_action_runtime.js?v=1772212000000"></script>
  <script src="js/core_history_canary_source_runtime.js?v=1772221000000"></script>
  <script src="js/core_history_canary_panel_runtime.js?v=1772195000000"></script>
  <script src="js/core_history_canary_policy_runtime.js?v=1772142000000"></script>
  <script src="js/core_history_canary_view_runtime.js?v=1772153000000"></script>
  <script src="js/core_history_summary_runtime.js?v=1772156000000"></script>
  <script src="js/core_history_export_runtime.js?v=1772222000000"></script>
  <script src="js/core_history_query_runtime.js?v=1772163000000"></script>
  <script src="js/core_history_record_view_runtime.js?v=1772219000000"></script>
  <script src="js/core_history_record_item_runtime.js?v=1772216000000"></script>
  <script src="js/core_history_import_runtime.js?v=1772171000000"></script>
  <script src="js/core_history_import_file_runtime.js?v=1772203000000"></script>
  <script src="js/core_history_record_actions_runtime.js?v=1772175000000"></script>
  <script src="js/core_history_toolbar_runtime.js?v=1772179000000"></script>
  <script src="js/core_history_toolbar_events_runtime.js?v=1772199000000"></script>
  <script src="js/core_history_mode_filter_runtime.js?v=1772205000000"></script>
  <script src="js/core_history_burnin_runtime.js?v=1772214000000"></script>
  <script src="js/core_history_adapter_diagnostics_runtime.js?v=1772220000000"></script>
  <script src="js/core_burnin_gate_runtime.js?v=1772006000000"></script>
  <script src="js/local_history_store.js?v=1772006000000"></script>
  <script src="js/history_page.js?v=1772222001000"></script>
</body>
</html>
